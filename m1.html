<!-- Modal old -->
<div class="backdrop is-hidden" data-modal>
  <div class="modal">
    <!-- Close buttom -->
    <button class="modal-btn btn" type="button" data-modal-close>
      <svg class="modal-icon" width="8" height="8">
        <use href="./images/icons.svg#close"></use>
      </svg>
    </button>

    <!-- Modal caption -->
    <p class="modal-caption">Leave your contacts and we will call you back</p>

    <!-- Modal form -->
    <form class="modal-form" name="contacts_form">
      <!-- Input Name -->
      <div class="modal-form-field">
        <label class="modal-form-label label" for="user-name">Name</label>
        <div class="modal-form-container">
          <input
            class="modal-form-input input"
            type="text"
            name="user-name"
            id="user-name"
          />
          <svg class="modal-form-icon" width="18" height="24">
            <use href="./images/icons.svg#user"></use>
          </svg>
        </div>
      </div>

      <!-- Input phone -->
      <div class="modal-form-field">
        <label class="modal-form-label label" for="user-phone">Phone</label>
        <div class="modal-form-container">
          <input
            class="modal-form-input input"
            type="tel"
            name="user-phone"
            id="user-phone"
          />
          <svg class="modal-form-icon" width="18" height="24">
            <use href="./images/icons.svg#phone"></use>
          </svg>
        </div>
      </div>

      <!-- Input email -->
      <div class="modal-form-field">
        <label class="modal-form-label label" for="user-email">Email</label>
        <div class="modal-form-container">
          <input
            class="modal-form-input input"
            type="email"
            name="user-email"
            id="user-email"
          />
          <svg class="modal-form-icon" width="18" height="24">
            <use href="./images/icons.svg#email"></use>
          </svg>
        </div>
      </div>

      <!-- Comment -->
      <div class="modal-form-field-textarea">
        <label class="modal-form-label label" for="user-comment">Comment</label>
        <textarea
          class="modal-form-textarea textarea"
          name="user-comment"
          id="user-comment"
          placeholder="Text input"
        ></textarea>
      </div>

      <!-- Privacy policy agreement -->
      <div class="modal-form-agreement">
        <input
          class="modal-form-checkbox visually-hidden"
          type="checkbox"
          name="user-privacy"
          value="true"
          id="user-privacy"
        />
        <label class="modal-form-agreement-field label" for="user-privacy">
          <!-- Custom checkbox -->
          <span class="modal-form-box">
            <svg class="modal-form-check" width="10" height="8">
              <use href="./images/icons.svg#check-mark"></use>
            </svg>
          </span>
          I accept the terms and conditions of the
          <a class="modal-form-link link" href="#">Privacy Policy</a>
        </label>
      </div>

      <!-- Button -->
      <button class="accent-btn btn" type="submit">Send</button>
    </form>
  </div>
</div>
